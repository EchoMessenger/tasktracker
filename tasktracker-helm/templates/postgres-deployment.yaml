apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tasktracker.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tasktracker.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "tasktracker.name" . }}-postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "tasktracker.name" . }}-postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_DB
              value: {{ .Values.database.name | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.database.username | quote }}
            - name: POSTGRES_PASSWORD
              {{- if .Values.openbao.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "tasktracker.fullname" . }}-database
                  key: password
              {{- else }}
              value: {{ .Values.database.password | default "postgres" | quote }}
              {{- end }}

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata

          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.database.username | quote }}
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.database.username | quote }}
            initialDelaySeconds: 5
            periodSeconds: 5

      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: {{ include "tasktracker.fullname" . }}-postgres-pvc