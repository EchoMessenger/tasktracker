name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt

    - name: Run unit tests with SQLite
      env:
        DATABASE_URL: "sqlite:///:memory:"
        TESTING: "true"
      run: |
        pytest tests -v --cov=. --cov-report=xml
  helm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm version
        run: helm version

      - name: Lint chart
        run: helm lint tasktracker-helm

      - name: Validate values with template
        run: helm template test tasktracker-helm -f tasktracker-helm/values.yaml