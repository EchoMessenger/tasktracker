name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt

    - name: Run unit tests with SQLite
      env:
        DATABASE_URL: "sqlite:///:memory:"
        TESTING: "true"
      run: |
        pytest tests -v --cov=. --cov-report=xml
  helm:
    runs-on: ubuntu-latest
    env:
      K8S_VERSION: "1.33.5"
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm version
        run: helm version

      - name: Lint chart
        run: helm lint tasktracker-helm

      - name: Validate values with template
        run: helm template test tasktracker-helm -f tasktracker-helm/values.yaml

      - name: Render manifests (helm template)
        run: |
          helm template test tasktracker-helm \
            -f tasktracker-helm/values.yaml \
            --kube-version $K8S_VERSION \
            --include-crds \
            > rendered.yaml

      - name: Install kubeconform
        run: |
          curl -L -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Offline manifest validation (OpenAPI)
        run: |
          kubeconform -strict -summary \
          -skip ExternalSecret \
          -kubernetes-version "$K8S_VERSION" \
          rendered.yaml
      - name: Install pluto
        run: |
          curl -L -o pluto.tar.gz \
            https://github.com/FairwindsOps/pluto/releases/download/v5.20.3/pluto_5.20.3_linux_amd64.tar.gz
          tar -xzf pluto.tar.gz pluto
          sudo mv pluto /usr/local/bin/pluto
      - name: Deprecated API check
        run: |
          pluto detect rendered.yaml --target-versions "k8s=v$K8S_VERSION"

      - name: Upload rendered manifests
          uses: actions/upload-artifact@v4
          with:
            name: rendered-manifests
            path: rendered.yaml
  server_side_dry_run:
    runs-on: ubuntu-latest
    needs: helm
    env:
      K8S_VERSION: "1.33.5"
    steps:
      - name: Download rendered manifests
        uses: actions/download-artifact@v4
        with:
          name: rendered-manifests

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.33.5"

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Create k3s cluster
        run: |
          k3d cluster create ci --image "rancher/k3s:v1.33.5-k3s1"
          kubectl get nodes

      - name: Server-side dry-run validation
        run: |
          kubectl apply --dry-run=server -f rendered.yaml